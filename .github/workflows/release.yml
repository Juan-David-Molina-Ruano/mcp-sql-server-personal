name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Publish self-contained Windows x64 executable
        run: |
          dotnet publish .\mcp-sql-server-personal.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -o .\publish

      - name: Package artifact
        run: |
          Compress-Archive -Path .\publish\* -DestinationPath .\mcp-sql-server-personal-win-x64.zip -Force

      - name: Generate SHA-256 checksum
        run: |
          $hash = Get-FileHash -Path .\mcp-sql-server-personal-win-x64.zip -Algorithm SHA256
          "$($hash.Hash)  mcp-sql-server-personal-win-x64.zip" | Out-File -FilePath .\mcp-sql-server-personal-win-x64.zip.sha256 -Encoding utf8

      - name: Attest build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: |
            ./mcp-sql-server-personal-win-x64.zip
            ./mcp-sql-server-personal-win-x64.zip.sha256

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release create "$env:RELEASE_TAG" `
            --title "$env:RELEASE_TAG" `
            --generate-notes `
            .\mcp-sql-server-personal-win-x64.zip `
            .\mcp-sql-server-personal-win-x64.zip.sha256
